<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Markdown Test</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th {
            background: #667eea;
            color: white;
            padding: 10px;
        }
        td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Markdown Rendering Test</h1>

    <div class="test-box">
        <h2>Raw Markdown:</h2>
        <pre id="raw"></pre>
    </div>

    <div class="test-box">
        <h2>Rendered Result:</h2>
        <div id="rendered"></div>
    </div>

    <script>
        const markdown = `
## Test Markdown

**Bold text** and *italic text*

### Table

| Name | Value |
|------|-------|
| A    | 100   |
| B    | 200   |

### Code Block

\`\`\`python
def hello():
    print("Hello World")
\`\`\`

### List

- Item 1
- Item 2
- Item 3
`;

        document.getElementById('raw').textContent = markdown;

        marked.setOptions({
            breaks: true,
            gfm: true,
            tables: true
        });

        const html = marked.parse(markdown);
        document.getElementById('rendered').innerHTML = html;

        // Highlight code blocks
        document.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
    </script>
</body>
</html>
