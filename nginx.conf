# Nginx Configuration for Excel Chatbot
# Save as: /etc/nginx/sites-available/excel-chatbot

server {
    listen 80;
    server_name excel-chatbot.yourcompany.com;  # Change to your domain

    # Redirect HTTP to HTTPS (optional but recommended)
    # return 301 https://$server_name$request_uri;

    client_max_body_size 50M;  # Allow large Excel file uploads

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large file processing
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Optional: Serve static files directly (if you add any)
    location /static/ {
        alias /path/to/excel-chatbot-byok/api/static/;
        expires 30d;
    }
}

